<!DOCTYPE html>
<html>
<head>
  <title>Overthink Bareng</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f0f1a, #1c1c2e);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin-top: 40px;
      font-size: 32px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    textarea {
      width: 70%;
      height: 90px;
      border-radius: 15px;
      padding: 15px;
      border: none;
      outline: none;
      font-size: 14px;
      background: #2a2a40;
      color: white;
    }

    button {
      margin-top: 15px;
      padding: 10px 25px;
      border-radius: 20px;
      border: none;
      background: #6c5ce7;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #8577ff;
    }

    .post {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      margin: 20px auto;
      padding: 15px;
      width: 70%;
      border-radius: 15px;
      text-align: left;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .relate {
      margin-top: 10px;
      font-size: 13px;
      color: #bbb;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Overthink Bareng</h1>
<p>"Kalau kamu lagi mikir sesuatu... mungkin aku juga."</p>

<textarea id="input" placeholder="Tulis sesuatu yang lagi kamu pikirin..."></textarea><br>
<button onclick="kirim()">Kirim Pikiran</button>

<div id="feed"></div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

function render() {
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.slice().reverse().forEach((item, i) => {
    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div>${item.text}</div>
      <div class="relate" onclick="relate(${i})">
        💭 ${item.relate} orang juga kepikiran ini
      </div>
    `;

    feed.appendChild(div);
  });
}

function kirim() {
  let input = document.getElementById("input");

  if (!input.value.trim()) return;

  data.push({
    text: input.value,
    relate: 0
  });

  localStorage.setItem("data", JSON.stringify(data));
  input.value = "";
  render();
}

function relate(i) {
  data[i].relate++;
  localStorage.setItem("data", JSON.stringify(data));
  render();
}

render();
</script>

</body>
</html>
